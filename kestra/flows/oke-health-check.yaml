id: oke-health-check
namespace: main

description: |
  Minimal demo flow — health check only. Import this first to prove console → Kestra works.
  No secrets or Kubernetes runner required.

inputs:
  - id: app_health_url
    type: STRING
    defaults: http://fastapi-minimal.enlight-platform.svc.cluster.local:8000/health

tasks:
  - id: health-check
    type: io.kestra.plugin.core.http.Request
    uri: "{{ inputs.app_health_url }}"
    method: GET
    timeout: PT30S

  - id: done
    type: io.kestra.plugin.core.log.Log
    message: "Health check passed — Enlight Lab pipeline is connected."
