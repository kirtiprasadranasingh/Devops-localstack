id: oke-health-check
namespace: main

description: |
  Minimal demo flow — health check only. Import this first to prove console → Kestra works.
  No secrets or Kubernetes runner required.

tasks:
  - id: health-check
    type: io.kestra.plugin.core.http.Request
    uri: http://fastapi.enlight-staging.svc.cluster.local/health
    method: GET
    timeout: PT30S

  - id: done
    type: io.kestra.plugin.core.log.Log
    message: "Health check passed — Enlight Lab pipeline is connected."
