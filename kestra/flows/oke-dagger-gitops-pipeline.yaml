id: oke-dagger-gitops-pipeline
namespace: main

description: |
  Full OKE pipeline — BuildKit build in-cluster, OCIR push, GitOps commit, ArgoCD sync, health check.
  Secrets: GITHUB_TOKEN, OCIR_USERNAME, OCIR_TOKEN
  Requires image: ap-mumbai-1.ocir.io/bmitpaosivqx/enlight-pipeline:v10

labels:
  env: oke
  project: enlight-lab
  flow-version: "2026-07-13-v6"

inputs:
  - id: git_branch
    type: STRING
    defaults: main
  - id: git_repo
    type: STRING
    defaults: https://github.com/kirtiprasadranasingh/Devops-localstack.git
  - id: image_tag
    type: STRING
    defaults: ""
  - id: ocir_registry
    type: STRING
    defaults: ap-mumbai-1.ocir.io/bmitpaosivqx
  - id: ocir_image_name
    type: STRING
    defaults: enlight-fastapi
  - id: pipeline_image
    type: STRING
    defaults: ap-mumbai-1.ocir.io/bmitpaosivqx/enlight-pipeline:v10
  - id: gitops_manifest
    type: STRING
    defaults: oke/gitops/apps/fastapi/deployment.yaml
  - id: k8s_namespace
    type: STRING
    defaults: enlight-platform
  - id: k8s_deployment
    type: STRING
    defaults: fastapi-minimal
  - id: app_health_url
    type: STRING
    defaults: http://fastapi-minimal.enlight-platform.svc.cluster.local:8000/health

tasks:
  - id: run-pipeline-job
    type: io.kestra.plugin.kubernetes.kubectl.Apply
    namespace: "{{ inputs.k8s_namespace }}"
    spec: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: enlight-pipeline-{{ execution.id | lower }}
        namespace: {{ inputs.k8s_namespace }}
      spec:
        backoffLimit: 0
        ttlSecondsAfterFinished: 3600
        activeDeadlineSeconds: 3600
        template:
          spec:
            serviceAccountName: kestra-runner
            imagePullSecrets:
              - name: ocir-pull-secret
            restartPolicy: Never
            volumes:
              - name: ocir-docker-config
                secret:
                  secretName: ocir-pull-secret
                  items:
                    - key: .dockerconfigjson
                      path: config.json
            containers:
              - name: pipeline
                image: {{ inputs.pipeline_image }}
                imagePullPolicy: Always
                securityContext:
                  privileged: true
                command:
                  - /bin/bash
                  - /pipeline/run.sh
                env:
                  - name: DOCKER_CONFIG
                    value: /root/.docker
                  - name: BUILDKIT_HOST
                    value: unix:///run/buildkit/buildkitd.sock
                  - name: GIT_BRANCH
                    value: "{{ inputs.git_branch }}"
                  - name: GIT_REPO
                    value: "{{ inputs.git_repo }}"
                  - name: GITOPS_MANIFEST
                    value: "{{ inputs.gitops_manifest }}"
                  - name: OCIR_REGISTRY
                    value: "{{ inputs.ocir_registry }}"
                  - name: OCIR_IMAGE_NAME
                    value: "{{ inputs.ocir_image_name }}"
                  - name: IMAGE_TAG
                    value: "{{ inputs.image_tag }}"
                  - name: GITHUB_TOKEN
                    value: "{{ secret('GITHUB_TOKEN') }}"
                volumeMounts:
                  - name: ocir-docker-config
                    mountPath: /root/.docker
                    readOnly: true
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2000m
                    memory: 3Gi

  - id: wait-pipeline
    type: io.kestra.plugin.core.flow.Sleep
    duration: PT90S

  - id: health-after
    type: io.kestra.plugin.core.http.Request
    uri: "{{ inputs.app_health_url }}"
    method: GET
    timeout: PT30S
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 8

  - id: done
    type: io.kestra.plugin.core.log.Log
    message: "Deploy complete via {{ inputs.pipeline_image }}"
