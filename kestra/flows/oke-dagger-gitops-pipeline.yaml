id: oke-dagger-gitops-pipeline
namespace: main

description: |
  Full OKE delivery pipeline — Enlight Lab client demo.
  Clone GitHub → Dagger build → push OCIR → GitOps commit → ArgoCD sync → health check.
  Uses kubectl.Apply Job (OSS-compatible — no Kubernetes script runner plugin).
  Required secrets: GITHUB_TOKEN, OCIR_USERNAME, OCIR_TOKEN

labels:
  env: oke
  project: enlight-lab

inputs:
  - id: git_branch
    type: STRING
    defaults: main
  - id: git_repo
    type: STRING
    defaults: https://github.com/kirtiprasadranasingh/Devops-localstack.git
  - id: image_tag
    type: STRING
    required: false
  - id: ocir_registry
    type: STRING
    defaults: ap-mumbai-1.ocir.io/bmitpaosivqx
  - id: ocir_image_name
    type: STRING
    defaults: enlight-fastapi
  - id: gitops_manifest
    type: STRING
    defaults: oke/gitops/apps/fastapi/deployment.yaml
  - id: k8s_namespace
    type: STRING
    defaults: enlight-platform
  - id: k8s_deployment
    type: STRING
    defaults: fastapi-minimal
  - id: app_health_url
    type: STRING
    defaults: http://fastapi-minimal.enlight-platform.svc.cluster.local:8000/health

tasks:
  - id: health-before
    type: io.kestra.plugin.core.http.Request
    uri: "{{ inputs.app_health_url }}"
    method: GET
    timeout: PT30S

  - id: run-pipeline-job
    type: io.kestra.plugin.kubernetes.kubectl.Apply
    namespace: "{{ inputs.k8s_namespace }}"
    spec:
      apiVersion: batch/v1
      kind: Job
      metadata:
        generateName: enlight-pipeline-
        namespace: "{{ inputs.k8s_namespace }}"
      spec:
        backoffLimit: 0
        ttlSecondsAfterFinished: 600
        template:
          spec:
            serviceAccountName: kestra-runner
            restartPolicy: Never
            containers:
              - name: pipeline
                image: python:3.12-alpine
                env:
                  - name: GIT_BRANCH
                    value: "{{ inputs.git_branch }}"
                  - name: GIT_REPO
                    value: "{{ inputs.git_repo }}"
                  - name: GITOPS_MANIFEST
                    value: "{{ inputs.gitops_manifest }}"
                  - name: OCIR_REGISTRY
                    value: "{{ inputs.ocir_registry }}"
                  - name: OCIR_IMAGE_NAME
                    value: "{{ inputs.ocir_image_name }}"
                  - name: IMAGE_TAG
                    value: "{{ inputs.image_tag }}"
                  - name: GITHUB_TOKEN
                    value: "{{ secret('GITHUB_TOKEN') }}"
                  - name: OCIR_USER
                    value: "{{ secret('OCIR_USERNAME') }}"
                  - name: OCIR_PASS
                    value: "{{ secret('OCIR_TOKEN') }}"
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -euxo pipefail
                    apk add --no-cache curl bash git sed
                    curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin sh
                    pip install --no-cache-dir dagger-io
                    TAG="${IMAGE_TAG:-$(date +%Y%m%d-%H%M%S)}"
                    FULL_IMAGE="${OCIR_REGISTRY}/${OCIR_IMAGE_NAME}:${TAG}"
                    AUTH=$(printf '%s:%s' "$OCIR_USER" "$OCIR_PASS" | base64 | tr -d '\n')
                    mkdir -p /root/.docker
                    printf '{"auths":{"ap-mumbai-1.ocir.io":{"auth":"%s"}}}' "$AUTH" > /root/.docker/config.json
                    REPO_URL="${GIT_REPO#https://}"
                    git clone --depth 1 -b "$GIT_BRANCH" "https://x-access-token:${GITHUB_TOKEN}@${REPO_URL}" /work
                    cd /work/sample-app/fastapi-minimal/dagger
                    dagger call build-and-publish \
                      --registry="${OCIR_REGISTRY}" \
                      --image="${OCIR_IMAGE_NAME}" \
                      --tag="${TAG}"
                    cd /work
                    git config user.email "kestra@enlightlab.com"
                    git config user.name "Kestra Enlight Lab"
                    sed -i "s|image:.*|image: ${FULL_IMAGE}|" "$GITOPS_MANIFEST"
                    git add "$GITOPS_MANIFEST"
                    git commit -m "deploy: ${FULL_IMAGE} [kestra pipeline]" || true
                    git push origin "$GIT_BRANCH"
                    echo "DONE ${FULL_IMAGE}"
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2000m
                    memory: 3Gi

  - id: wait-argocd
    type: io.kestra.plugin.core.flow.Sleep
    duration: PT90S

  - id: rollout-status
    type: io.kestra.plugin.kubernetes.kubectl.Restart
    namespace: "{{ inputs.k8s_namespace }}"
    resourceType: Deployment
    resourcesNames:
      - "{{ inputs.k8s_deployment }}"

  - id: wait-rollout
    type: io.kestra.plugin.core.flow.Sleep
    duration: PT45S

  - id: health-after
    type: io.kestra.plugin.core.http.Request
    uri: "{{ inputs.app_health_url }}"
    method: GET
    timeout: PT30S

  - id: done
    type: io.kestra.plugin.core.log.Log
    message: |
      Enlight Lab deploy complete.
      Image: {{ inputs.ocir_registry }}/{{ inputs.ocir_image_name }}
      GitOps: {{ inputs.gitops_manifest }}
