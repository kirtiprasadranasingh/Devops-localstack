apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-minimal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kirtiprasad2003/platform-poc.git
    targetRevision: main
    path: oke/gitops/apps/fastapi
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: enlight-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
