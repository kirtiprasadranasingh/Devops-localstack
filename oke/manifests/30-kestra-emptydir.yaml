# Kestra with emptyDir — works when cluster has no default StorageClass (OKE free tier).
apiVersion: v1
kind: Service
metadata:
  name: kestra
  namespace: enlight-platform
  labels:
    app: kestra
spec:
  type: ClusterIP
  selector:
    app: kestra
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestra
  namespace: enlight-platform
  labels:
    app: kestra
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kestra
  template:
    metadata:
      labels:
        app: kestra
    spec:
      serviceAccountName: kestra-server
      containers:
        - name: kestra
          image: docker.io/kestra/kestra:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - local
          ports:
            - containerPort: 8080
          env:
            - name: KESTRA_CONFIGURATION
              value: |
                kestra:
                  tutorialFlows:
                    enabled: false
                  server:
                    basic-auth:
                      username: admin@enlightlab.com
                      password: Admin1234
          volumeMounts:
            - name: kestra-data
              mountPath: /app/storage
            - name: kestra-db
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 120
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: kestra-data
          emptyDir: {}
        - name: kestra-db
          emptyDir: {}
