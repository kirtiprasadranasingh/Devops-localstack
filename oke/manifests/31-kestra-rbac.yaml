# RBAC so Kestra server + task jobs can run pipelines on the cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kestra-server
  namespace: enlight-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kestra-runner
  namespace: enlight-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestra-server
  namespace: enlight-platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestra-server
  namespace: enlight-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestra-server
subjects:
  - kind: ServiceAccount
    name: kestra-server
    namespace: enlight-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestra-runner
  namespace: enlight-platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestra-runner
  namespace: enlight-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestra-runner
subjects:
  - kind: ServiceAccount
    name: kestra-runner
    namespace: enlight-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestra-rollout
  namespace: enlight-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestra-rollout
  namespace: enlight-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestra-rollout
subjects:
  - kind: ServiceAccount
    name: kestra-runner
    namespace: enlight-platform
  - kind: ServiceAccount
    name: kestra-server
    namespace: enlight-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestra-rollout
  namespace: enlight-platform
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestra-rollout
  namespace: enlight-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestra-rollout
subjects:
  - kind: ServiceAccount
    name: kestra-runner
    namespace: enlight-platform
  - kind: ServiceAccount
    name: kestra-server
    namespace: enlight-platform
