# ArgoCD at argocd.enlightlab.com — TLS secret name filled by 21-fix-argocd-enlightlab-tls.sh
# Or copy spec.tls.secretName from selfheal-ui-ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-enlightlab
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.enlightlab.com
      secretName: PLACEHOLDER_TLS_SECRET
  rules:
    - host: argocd.enlightlab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
