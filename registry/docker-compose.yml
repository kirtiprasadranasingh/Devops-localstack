# Local registry on kestra-net so dind/Kestra can push as registry:5000
services:
  registry:
    image: registry:2
    container_name: local-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      kestra-net:
        aliases:
          - registry

volumes:
  registry-data:

networks:
  kestra-net:
    external: true
    name: kestra-net
