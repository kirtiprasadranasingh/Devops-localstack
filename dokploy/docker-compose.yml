services:
  dokploy:
    image: dokploy/dokploy:latest
    container_name: dokploy
    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://dokploy:dokploypass@postgres:5432/dokploy
      REDIS_URL: redis://redis:6379

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16
    container_name: dokploy-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: dokploy
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: dokploypass

    volumes:
      - dokploy-db:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dokploy-redis
    restart: unless-stopped

volumes:
  dokploy-db: